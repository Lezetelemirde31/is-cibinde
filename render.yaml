# Render.com blueprint — deploys BOTH the FastAPI backend and the Next.js
# frontend. In Render: New + → "Blueprint" → connect this repo (or press
# "Manual sync" on an existing blueprint after pushing changes).
# Set every `sync: false` env var in the dashboard (they are secrets/config).
services:
  # ---- Backend: FastAPI (Docker) ----
  - type: web
    name: iscibinde-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false # Neon connection string (postgresql+psycopg://...)
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_ISSUER
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false # the frontend URL, e.g. https://iscibinde-web.onrender.com

  # ---- Frontend: Next.js (Node) ----
  # Node runtime (not Docker) so NEXT_PUBLIC_* vars are available at build time.
  - type: web
    name: iscibinde-web
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    # Bind explicitly to Render's injected $PORT on all interfaces, otherwise
    # next start may not be reachable by Render's router.
    startCommand: npx next start -H 0.0.0.0 -p $PORT
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: BACKEND_URL
        sync: false # https://iscibinde-api.onrender.com
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false # https://iscibinde-web.onrender.com

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
        env:
          # Build needs these present; use placeholder values in CI. The
          # publishable key is public by design; the secret is a dummy (the
          # build never calls the Clerk API).
          BACKEND_URL: http://localhost:8000
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_cHJvLXdvbWJhdC0zLmNsZXJrLmFjY291bnRzLmRldiQ
          CLERK_SECRET_KEY: sk_test_ci

  backend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements-dev.txt
      - run: python -m compileall app
      - run: python -c "import app.main"
        env:
          DATABASE_URL: postgresql+psycopg://user:pass@localhost:5432/db
          CLERK_SECRET_KEY: sk_test_ci
          CLERK_ISSUER: https://example.clerk.accounts.dev
      - run: pytest -q
        env:
          DATABASE_URL: postgresql+psycopg://user:pass@localhost:5432/db
          CLERK_SECRET_KEY: sk_test_ci
          CLERK_ISSUER: https://example.clerk.accounts.dev
